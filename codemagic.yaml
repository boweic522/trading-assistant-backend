workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    scripts:
      - name: Initialize Flutter iOS project
        script: |
          cd flutter_app_updated
          flutter clean
          flutter pub get
      - name: Build iOS app
        script: |
          cd flutter_app_updated
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
