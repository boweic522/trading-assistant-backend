workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    scripts:
      - name: Create Flutter project structure if needed
        script: |
          cd flutter_app_updated
          # Initialize iOS configuration
          flutter pub get
          flutter clean
      - name: Build iOS app
        script: |
          cd flutter_app_updated
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
